name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build-and-smoke-test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag postfix-smoke-test

    - name: Create dummy SQL credential files
      run: |
        echo "testuser" > /tmp/sql_user.txt
        echo "testpass" > /tmp/sql_password.txt

    - name: Start container
      run: |
        docker run -d --name postfix-test \
          -e MYHOSTNAME=mail.example.com \
          -e MYNETWORKS="127.0.0.0/8" \
          -e SQL_USER_FILE=/tmp/sql_user.txt \
          -e SQL_PASSWORD_FILE=/tmp/sql_password.txt \
          -e SQL_HOST=127.0.0.1 \
          -e SQL_DB_NAME=postfix \
          -e SPAMHAUS_DISABLE=1 \
          -v /tmp/sql_user.txt:/tmp/sql_user.txt:ro \
          -v /tmp/sql_password.txt:/tmp/sql_password.txt:ro \
          -p 2525:25 \
          postfix-smoke-test

    - name: Wait for services to start
      run: |
        for i in $(seq 1 30); do
          if docker exec postfix-test supervisorctl -c /etc/supervisord.conf status | grep -q RUNNING; then
            echo "Services started after ${i}s"
            break
          fi
          sleep 1
        done

    - name: Verify Postfix is running
      run: |
        docker exec postfix-test supervisorctl -c /etc/supervisord.conf status postfix
        docker exec postfix-test postconf myhostname | grep mail.example.com

    - name: Verify PostSRSd is running
      run: docker exec postfix-test supervisorctl -c /etc/supervisord.conf status postsrs

    - name: Verify SMTP responds on port 25
      run: |
        response=$(docker exec postfix-test bash -c 'echo QUIT | nc -w 5 127.0.0.1 25')
        echo "$response"
        echo "$response" | grep -q "220"

    - name: Verify SRS config contains domain
      run: docker exec postfix-test grep 'mail.example.com' /etc/default/postsrsd

    - name: Verify milter packages are installed
      run: |
        docker exec postfix-test dpkg -l postgrey | grep -q '^ii'
        docker exec postfix-test dpkg -l spamassassin | grep -q '^ii'
        docker exec postfix-test dpkg -l spamass-milter | grep -q '^ii'
        docker exec postfix-test dpkg -l opendmarc | grep -q '^ii'
        docker exec postfix-test dpkg -l opendkim | grep -q '^ii'
        docker exec postfix-test dpkg -l miltertest | grep -q '^ii'
        docker exec postfix-test dpkg -l rsyslog | grep -q '^ii'
        echo "All milter packages verified"

    - name: Verify milter setup (vhome directory and SpamAssassin config)
      run: |
        docker exec postfix-test test -d /vhome/users
        docker exec postfix-test stat -c '%U:%G' /vhome/users | grep -q 'debian-spamd:debian-spamd'
        docker exec postfix-test grep -q 'score MISSING_DATE 0' /etc/spamassassin/local.cf
        docker exec postfix-test grep -q 'score INVALID_DATE 0' /etc/spamassassin/local.cf
        echo "Milter setup verified"

    - name: Verify milter scripts are present and executable
      run: |
        for script in spamd.sh sa_learn.sh spamass.sh postgrey.sh opendkim.sh opendmarc.sh create_opendkim_conf.sh healthcheck.sh; do
          docker exec postfix-test test -x /scripts/$script || { echo "FAIL: /scripts/$script not executable"; exit 1; }
          echo "OK: /scripts/$script"
        done
        for spec in dkim_milter_test_spec.lua dmarc_milter_test_spec.lua spamass_milter_test_spec.lua; do
          docker exec postfix-test test -f /scripts/$spec || { echo "FAIL: /scripts/$spec missing"; exit 1; }
          echo "OK: /scripts/$spec"
        done
        echo "All milter scripts verified"

    - name: Verify milter services are managed by supervisor
      run: |
        for svc in rsyslog spamd sa_learn postgrey spamass opendkim opendmarc; do
          docker exec postfix-test supervisorctl -c /etc/supervisord.conf status $svc
        done
        echo "All milter services registered in supervisor"

    - name: Verify entrypoint is idempotent (master.cf not mangled on restart)
      run: |
        docker rm -f idem-test 2>/dev/null || true
        docker run -d --name idem-test \
          -e MYHOSTNAME=mail.example.com \
          -e MYNETWORKS="127.0.0.0/8" \
          -e SQL_USER_FILE=/tmp/sql_user.txt \
          -e SQL_PASSWORD_FILE=/tmp/sql_password.txt \
          -e SQL_HOST=127.0.0.1 \
          -e SQL_DB_NAME=postfix \
          -e SPAMHAUS_DISABLE=1 \
          -e SPF_ENABLE=1 \
          -e SMTPS_ENABLE=1 \
          -e AUTHORIZED_SMTPD_XCLIENT_HOSTS=172.20.0.1 \
          -v /tmp/sql_user.txt:/tmp/sql_user.txt:ro \
          -v /tmp/sql_password.txt:/tmp/sql_password.txt:ro \
          postfix-smoke-test
        sleep 5
        # Save counts after first start
        MASTER_LINES_1=$(docker exec idem-test bash -c 'wc -l < /etc/postfix/master.cf')
        XCLIENT_1=$(docker exec idem-test grep -c smtpd_authorized_xclient_hosts /etc/postfix/master.cf)
        SPF_1=$(docker exec idem-test grep -c '^policyd-spf' /etc/postfix/master.cf)
        SMTPS_1=$(docker exec idem-test grep -c '^smtps' /etc/postfix/master.cf)
        SRS_1=$(docker exec idem-test grep -c 'SRS_DOMAIN' /etc/default/postsrsd)
        # Restart container (re-runs entrypoint)
        docker restart idem-test
        sleep 5
        # Compare counts after restart
        MASTER_LINES_2=$(docker exec idem-test bash -c 'wc -l < /etc/postfix/master.cf')
        XCLIENT_2=$(docker exec idem-test grep -c smtpd_authorized_xclient_hosts /etc/postfix/master.cf)
        SPF_2=$(docker exec idem-test grep -c '^policyd-spf' /etc/postfix/master.cf)
        SMTPS_2=$(docker exec idem-test grep -c '^smtps' /etc/postfix/master.cf)
        SRS_2=$(docker exec idem-test grep -c 'SRS_DOMAIN' /etc/default/postsrsd)
        echo "master.cf lines: $MASTER_LINES_1 -> $MASTER_LINES_2"
        echo "xclient: $XCLIENT_1 -> $XCLIENT_2"
        echo "policyd-spf: $SPF_1 -> $SPF_2"
        echo "smtps: $SMTPS_1 -> $SMTPS_2"
        echo "SRS_DOMAIN: $SRS_1 -> $SRS_2"
        [[ "$MASTER_LINES_1" == "$MASTER_LINES_2" ]] || { echo "FAIL: master.cf grew after restart"; exit 1; }
        [[ "$XCLIENT_1" == "$XCLIENT_2" ]] || { echo "FAIL: xclient lines duplicated"; exit 1; }
        [[ "$SPF_1" == "$SPF_2" ]] || { echo "FAIL: policyd-spf duplicated"; exit 1; }
        [[ "$SMTPS_1" == "$SMTPS_2" ]] || { echo "FAIL: smtps duplicated"; exit 1; }
        [[ "$SRS_1" == "$SRS_2" ]] || { echo "FAIL: SRS_DOMAIN duplicated"; exit 1; }
        echo "Idempotency verified"
        docker rm -f idem-test

    - name: Show logs on failure
      if: failure()
      run: docker logs postfix-test

    - name: Cleanup
      if: always()
      run: |
        docker rm -f postfix-test || true
        docker rm -f idem-test || true

  milter-integration-test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag postfix-milter-test

    - name: Create dummy credential and DKIM key files
      run: |
        echo "testuser" > /tmp/sql_user.txt
        echo "testpass" > /tmp/sql_password.txt
        mkdir -p /tmp/dkim-keys
        openssl genrsa -out /tmp/dkim-keys/mail.private 2048 2>/dev/null

    - name: Start container with all milters enabled
      run: |
        docker run -d --name milter-test \
          -e MYHOSTNAME=mail.example.com \
          -e MYNETWORKS="127.0.0.0/8" \
          -e SQL_USER_FILE=/tmp/sql_user.txt \
          -e SQL_PASSWORD_FILE=/tmp/sql_password.txt \
          -e SQL_HOST=127.0.0.1 \
          -e SQL_DB_NAME=postfix \
          -e SPAMHAUS_DISABLE=1 \
          -e POSTGREY_SOCKET_PATH=private/postgrey \
          -e SPAMASS_SOCKET_PATH=private/spamass \
          -e DKIM_SOCKET_PATH=private/dkim \
          -e DKIM_DOMAINS=example.com \
          -e DKIM_SELECTOR=mail \
          -e DKIM_KEY_PATH=/etc/opendkim/keys/mail.private \
          -e DMARC_SOCKET_PATH=private/dmarc \
          -e MAIL_HOSTNAME=mail.example.com \
          -v /tmp/sql_user.txt:/tmp/sql_user.txt:ro \
          -v /tmp/sql_password.txt:/tmp/sql_password.txt:ro \
          -v /tmp/dkim-keys:/etc/opendkim/keys:ro \
          postfix-milter-test

    - name: Wait for all services to reach RUNNING state
      run: |
        SERVICES="postfix postsrs rsyslog spamd sa_learn postgrey spamass opendkim opendmarc"
        for i in $(seq 1 60); do
          all_running=true
          for svc in $SERVICES; do
            status=$(docker exec milter-test supervisorctl -c /etc/supervisord.conf status $svc 2>/dev/null | awk '{print $2}')
            if [[ "$status" != "RUNNING" ]]; then
              all_running=false
              break
            fi
          done
          if $all_running; then
            echo "All services running after ${i}s"
            break
          fi
          if [[ $i -eq 60 ]]; then
            echo "TIMEOUT: not all services reached RUNNING after 60s"
            docker exec milter-test supervisorctl -c /etc/supervisord.conf status
            exit 1
          fi
          sleep 1
        done

    - name: Verify all milter services are running
      run: |
        docker exec milter-test supervisorctl -c /etc/supervisord.conf status
        for svc in postfix postsrs rsyslog spamd sa_learn postgrey spamass opendkim opendmarc; do
          status=$(docker exec milter-test supervisorctl -c /etc/supervisord.conf status $svc | awk '{print $2}')
          echo "$svc: $status"
          if [[ "$status" != "RUNNING" ]]; then
            echo "FAIL: $svc is not RUNNING (status: $status)"
            exit 1
          fi
        done
        echo "All services running"

    - name: Verify PostSRSd responds on ports 10001 and 10002
      run: |
        docker exec milter-test bash -c 'echo "get test@example.com" | nc -w 2 127.0.0.1 10001' || true
        docker exec milter-test bash -c 'echo "get test@example.com" | nc -w 2 127.0.0.1 10002' || true
        echo "PostSRSd ports responding"

    - name: Verify milter socket directories exist with correct permissions
      run: |
        docker exec milter-test test -d /var/spool/postfix/private
        perms=$(docker exec milter-test stat -c '%U:%G %a' /var/spool/postfix/private)
        echo "Socket dir permissions: $perms"
        echo "$perms" | grep -q 'postfix:opendkim'
        echo "$perms" | grep -q '775'
        echo "Socket directory permissions verified"

    - name: Verify milter sockets are accessible by postfix
      run: |
        # Wait for sockets to be created
        for i in $(seq 1 15); do
          if docker exec milter-test test -S /var/spool/postfix/private/dkim; then break; fi
          sleep 1
        done
        # DKIM socket: must be group opendkim so postfix (in opendkim group) can access
        dkim_perms=$(docker exec milter-test stat -c '%U:%G %a' /var/spool/postfix/private/dkim)
        echo "DKIM socket: $dkim_perms"
        echo "$dkim_perms" | grep -q 'opendkim'
        # DMARC socket: same requirement
        dmarc_perms=$(docker exec milter-test stat -c '%U:%G %a' /var/spool/postfix/private/dmarc)
        echo "DMARC socket: $dmarc_perms"
        echo "$dmarc_perms" | grep -q 'opendkim'
        echo "Milter socket permissions verified"

    - name: Verify DKIM configuration was generated
      run: |
        docker exec milter-test test -f /etc/opendkim.conf
        docker exec milter-test grep -q 'private/dkim' /etc/opendkim.conf
        docker exec milter-test test -f /etc/opendkim/KeyTable
        docker exec milter-test grep -q 'example.com' /etc/opendkim/KeyTable
        docker exec milter-test test -f /etc/opendkim/SigningTable
        docker exec milter-test grep -q 'example.com' /etc/opendkim/SigningTable
        echo "DKIM config verified"

    - name: Verify DMARC configuration was patched
      run: |
        docker exec milter-test grep -q 'AuthservID OpenDMARC' /etc/opendmarc.conf
        docker exec milter-test grep -q 'mail.example.com' /etc/opendmarc.conf
        echo "DMARC config verified"

    - name: Verify SMTP responds on port 25
      run: |
        response=$(docker exec milter-test bash -c 'echo QUIT | nc -w 5 127.0.0.1 25')
        echo "$response"
        echo "$response" | grep -q "220"

    - name: Verify idempotency with milters enabled
      run: |
        # Save counts after first start
        MASTER_LINES_1=$(docker exec milter-test bash -c 'wc -l < /etc/postfix/master.cf')
        DMARC_CONF_1=$(docker exec milter-test grep -c 'AuthservID' /etc/opendmarc.conf)
        # Restart container (re-runs entrypoint)
        docker restart milter-test
        sleep 10
        # Compare counts after restart
        MASTER_LINES_2=$(docker exec milter-test bash -c 'wc -l < /etc/postfix/master.cf')
        DMARC_CONF_2=$(docker exec milter-test grep -c 'AuthservID' /etc/opendmarc.conf)
        echo "master.cf lines: $MASTER_LINES_1 -> $MASTER_LINES_2"
        echo "DMARC AuthservID: $DMARC_CONF_1 -> $DMARC_CONF_2"
        [[ "$MASTER_LINES_1" == "$MASTER_LINES_2" ]] || { echo "FAIL: master.cf grew after restart"; exit 1; }
        [[ "$DMARC_CONF_1" == "$DMARC_CONF_2" ]] || { echo "FAIL: opendmarc.conf grew after restart"; exit 1; }
        echo "Milter idempotency verified"

    - name: Show logs on failure
      if: failure()
      run: docker logs milter-test

    - name: Cleanup
      if: always()
      run: docker rm -f milter-test || true
